<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Web AR | Posgrado en Diseño Industrial</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #ffffff; /* fondo blanco */
      --panel: #0f3a8c;
      --panel-2: #0a2f73;
      --border: #1e4fb3;
      --text: #0a2a66;
      --muted: #3a4a7a;
      --soft: #9fa4aa;
      --accent: #ffffff;
      --accent-2: #cfe0ff;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: 
        url('patron.jpg') repeat,
        var(--bg);
      background-size: 300px;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      width: 100%;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(to bottom, #0a2a66, #081f4d);
    }

    .topbar-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-wrap {
      width: 62px;
      height: 62px;
      flex: 0 0 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0c2f73;
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .topbar-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .topbar-text .eyebrow {
      font-size: 0.82rem;
      color: var(--accent-2);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .topbar-text .institution {
      font-size: 1rem;
      font-weight: 700;
      color: #ffffff;
    }

    .topbar-text .lab {
      font-size: 0.95rem;
      color: var(--muted);
    }

    .hero {
      max-width: 1180px;
      margin: 0 auto;
      padding: 34px 20px 18px;
      width: 100%;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 20px;
      align-items: stretch;
    }

    .hero-main,
    .hero-side {
      background: linear-gradient(to bottom, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 12px 36px rgba(0,0,0,0.25);
      color: white;
    }

    .hero-main { padding: 28px 26px; }
    .hero-side { padding: 24px 22px; }

    h1 {
      margin: 0 0 14px 0;
      font-size: 2.2rem;
      color: #ffffff;
    }

    .lead {
      margin: 0;
      font-size: 1rem;
      line-height: 1.7;
      color: var(--accent-2);
    }

    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 18px; }

    .chip {
      padding: 10px 14px;
      border-radius: 999px;
      background: #0c2f73;
      border: 1px solid var(--border);
      color: white;
      font-size: 0.92rem;
    }

    .viewer-section {
      max-width: 1180px;
      width: 100%;
      margin: 0 auto;
      padding: 4px 20px 24px;
    }

    .viewer-flex {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      align-items: stretch;
    }

    .viewer-card {
      background: linear-gradient(to bottom, #0f3a8c, #0a2f73);
      border: 1px solid var(--border);
      border-radius: 26px;
      overflow: hidden;
    }

    .side-image {
      border-radius: 26px;
      overflow: hidden;
    }

    .side-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    model-viewer {
      width: 100%;
      height: 72vh;
      background: radial-gradient(circle, #1b4fc9, #0a2a66);
    }

    .viewer-info {
      padding: 18px;
      text-align: center;
      color: #cfe0ff;
    }

    .sections {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 20px 32px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .section {
      background: linear-gradient(to bottom, var(--panel), var(--panel-2));
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      color: white;
    }

    footer {
      margin-top: auto;
      border-top: 1px solid var(--border);
      background: #081f4d;
      color: white;
    }

    .footer-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 20px 24px;
      text-align: center;
    }

    @media (max-width: 980px) {
      .hero-grid,
      .sections,
      .viewer-flex {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <section class="viewer-section">
    <div class="viewer-flex">

      <div class="viewer-card">
        <model-viewer
          src="smartwatch.glb"
          ios-src="smartwatch.usdz"
          alt="Modelo 3D"
          ar
          camera-controls
          auto-rotate>
        </model-viewer>

        <div class="viewer-info">
          <strong>tiempo talavera</strong>
        </div>
      </div>

      <div class="side-image">
        <img src="smartwatch.png" alt="Imagen del modelo Talavera">
      </div>

    </div>
  </section>

</body>
</html>
